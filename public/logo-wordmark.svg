<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 160" width="760" height="160" role="img" aria-label="Museni Nexus">
  <!-- The gradient definition: the same three brand colors as your CSS,
       at 0% / 50% / 100%. x1..y2 aim it left-to-right with a slight downward
       tilt to echo the website's 120deg angle. -->
  <defs>
    <linearGradient id="nexusGradient" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0" stop-color="#2dd4bf" />
      <stop offset="0.5" stop-color="#22d3ee" />
      <stop offset="1" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- One group sets the shared font for both words. "Museni" is white and
       anchored at its END (right edge) at x=372; "Nexus" is gradient and
       anchored at its START (left edge) at x=388. Anchoring them to a shared
       point keeps the gap consistent no matter the font. -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Arial, sans-serif"
     font-weight="700" font-size="96" letter-spacing="-1">
    <text x="372" y="112" text-anchor="end" fill="#ffffff">Museni</text>
    <text x="388" y="112" text-anchor="start" fill="url(#nexusGradient)">Nexus</text>
  </g>
</svg>
